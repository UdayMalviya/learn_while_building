syntax = "proto3";

package proto;

option go_package = "benchmark/gen";

message User {
  int64 id = 1;
  string name = 2;
  map<string, string> metadata = 3;
}

message Item {
  int64 id = 1;
  double price = 2;
  repeated string tags = 3;
}

message Context {
  int64 timestamp = 1;
  repeated string flags = 2;
}

message Payload {
  User user = 1;
  repeated Item items = 2;
  Context context = 3;
}

service Processor {
  rpc Process(Payload) returns (Payload);
}